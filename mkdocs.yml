site_name: Versioner Documentation
site_url: https://docs.versioner.io
site_description: Deployment governance for engineering teams
site_author: Versioner Team
repo_url: https://github.com/versioner-io/versioner-docs
repo_name: versioner-io/versioner-docs

# Only build from the public/ directory
docs_dir: public
site_dir: site

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  logo: assets/versioner-logo.png
  favicon: assets/versioner-logo.png
  palette:
    # Dark mode only
    scheme: slate
    primary: teal
    accent: teal
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Navigation structure
nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - Guides:
      - Overview: guides/index.md
      - Setting Up Notifications: guides/notifications.md
      - Configuring Deployment Buttons: guides/deployment-buttons.md
      - Tracking Terraform / IaC Versions: guides/terraform.md
  - Integrations:
      - Overview: integrations/index.md
      - Troubleshooting: integrations/troubleshooting.md
      - Native Integrations:
          - Overview: integrations/native/index.md
          - GitHub Action: integrations/native/github-action.md
          - Vercel: integrations/native/vercel.md
      - CLI:
          - Overview: cli/index.md
          - Installation: cli/installation.md
          - Usage: cli/usage.md
          - GitHub Actions: cli/github-actions.md
          - GitLab CI: cli/gitlab-ci.md
          - Jenkins: cli/jenkins.md
          - CircleCI: cli/circleci.md
          - Bitbucket Pipelines: cli/bitbucket-pipelines.md
          - Azure DevOps: cli/azure-devops.md
          - Travis CI: cli/travis-ci.md
          - Rundeck: cli/rundeck.md
      - REST API:
          - Overview: api/index.md
          - Authentication: api/authentication.md
          - Event Tracking: api/event-tracking.md
  - AI Agents:
      - MCP Server: ai-agents/mcp.md
  - Concepts:
      - Overview: concepts/index.md
      - How It Works: concepts/how-it-works.md
      - Products: concepts/catalog/products.md
      - Versions: concepts/catalog/versions.md
      - Environments: concepts/catalog/environments.md
      - Deployments: concepts/catalog/deployments.md
      - Governance:
          - Environment State Matrix: concepts/governance/environment-state-matrix.md
          - Deployment Requests: concepts/governance/deployment-requests.md
          - Deployment Rules: concepts/governance/deployment-rules.md
  - Reference:
      - Variables: reference/variables.md
      - User Roles: reference/user-roles.md
      - API Event Types: reference/event-types.md
      - API Response Codes: reference/response-codes.md
      - API Interactive Docs: reference/interactive-docs.md

# Markdown extensions
markdown_extensions:
  # Admonitions (callouts)
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # Tabbed content
  - pymdownx.tabbed:
      alternate_style: true

  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true

  # Emoji support
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Tables
  - tables

  # Table of contents
  - toc:
      permalink: true
      toc_depth: 3

  # Footnotes
  - footnotes

  # Abbreviations
  - abbr
  - attr_list
  - md_in_html

# Plugins
plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - redirects:
      redirect_maps:
        getting-started/quick-start.md: getting-started/index.md
        getting-started/how-it-works.md: concepts/how-it-works.md
        integrations/github-action.md: integrations/native/github-action.md
        integrations/vercel.md: integrations/native/vercel.md
        agents/index.md: ai-agents/mcp.md
        agents/mcp.md: ai-agents/mcp.md
        integrations/mcp.md: ai-agents/mcp.md
        concepts/configuration/notifications.md: guides/notifications.md
        concepts/configuration/deployment-buttons.md: guides/deployment-buttons.md
        concepts/configuration/variables.md: reference/variables.md
        concepts/configuration/user-roles.md: reference/user-roles.md
        api/event-types.md: reference/event-types.md
        api/interactive-docs.md: reference/interactive-docs.md
        api/response-codes.md: reference/response-codes.md

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/versioner-io/versioner-api
      name: Versioner on GitHub
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  # version:
  #   provider: mike

